name: Check directory has new or changed files
on:
  workflow_call:
    inputs:
      directoryPath:
        required: true
        type: string
        description: 'Directory path to check for new or changed files (e.g. ".changeset")'
      ignoreFiles:
        required: false
        type: string
        default: ''
        description: 'Comma-separated list of filenames to ignore (e.g. "README.md,config.json")'
      failMessage:
        required: false
        type: string
        default: ''
        description: 'Custom failure message. Defaults to: No new or changed files found in "<directoryPath>"'

jobs:
  check_directory_files_changed:
    runs-on: ubuntu-latest
    steps:
      - run: npm install parse-diff

      - uses: actions/github-script@v6
        name: Check for changed files in directory
        id: diff-result
        env:
          INPUT_DIRECTORY_PATH: ${{ inputs.directoryPath }}
          INPUT_IGNORE_FILES: ${{ inputs.ignoreFiles }}
        with:
          script: |
            const diff_url = context.payload.pull_request.diff_url
            try {
              const diff = await github.request(diff_url)

              const parse = require('parse-diff')
              const files = (parse(diff.data || '') || [])

              const directoryPath = process.env.INPUT_DIRECTORY_PATH || ''
              const ignoreFiles = (process.env.INPUT_IGNORE_FILES || '')
                .split(',')
                .map(f => f.trim())
                .filter(Boolean)

              const prefix = directoryPath.endsWith('/') ? directoryPath : directoryPath + '/'

              const matchingFiles = files.filter(f => {
                const filePath = f.to || ''
                if (!filePath.startsWith(prefix)) return false
                const fileName = filePath.split('/').pop()
                if (ignoreFiles.includes(fileName)) return false
                return true
              })

              core.setOutput('hasChanges', matchingFiles.length > 0)
              core.setOutput('matchedFiles', matchingFiles.map(f => f.to).join(', '))
              core.info(`Found ${matchingFiles.length} changed file(s) in "${directoryPath}": ${matchingFiles.map(f => f.to).join(', ')}`)
            } catch (err) {
              core.warning(`Could not get file diff. Reason: ${err}`)
              core.setOutput('hasChanges', false)
              core.setOutput('matchedFiles', '')
            }

      - name: Fail if no files changed in directory
        if: ${{ steps.diff-result.outputs.hasChanges != 'true' }}
        uses: actions/github-script@v6
        env:
          INPUT_FAIL_MESSAGE: ${{ inputs.failMessage }}
          INPUT_DIRECTORY_PATH: ${{ inputs.directoryPath }}
        with:
          script: |
            const customMessage = process.env.INPUT_FAIL_MESSAGE || ''
            const directoryPath = process.env.INPUT_DIRECTORY_PATH || ''
            const defaultMessage = `No new or changed files found in "${directoryPath}"`
            core.setFailed(customMessage || defaultMessage)
